<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="مختبر عُمان الافتراضي — تسجيل الدخول | Virtual STEM Lab Oman — Login">
<title>تسجيل الدخول | Virtual STEM Lab — Oman</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/Main.css">
<link rel="stylesheet" href="css/Auth.css">
</head>
<body>

<!-- Skip link for keyboard/screen-reader users -->
<a href="#authPageRoot" class="skip-link">تخطي إلى المحتوى الرئيسي | Skip to main content</a>

<!-- ARIA live region for announcements -->
<div id="liveRegion" aria-live="polite" aria-atomic="true"
     style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">
</div>

<!-- Language toggle in top-right corner -->
<div style="position:fixed;top:16px;right:16px;z-index:50;" role="group" aria-label="Language selection">
  <div class="lang-toggle">
    <button class="lang-btn active" id="btnAr" onclick="handleLanguageToggle('ar')"
            aria-pressed="true"><span data-i18n="langArLabel">عربي</span></button>
    <button class="lang-btn" id="btnEn" onclick="handleLanguageToggle('en')"
            aria-pressed="false"><span data-i18n="langEnLabel">EN</span></button>
  </div>
</div>

<main id="authPageRoot" class="auth-page">
  <div class="auth-card" role="main">

    <!-- Logo -->
    <div class="auth-logo" aria-hidden="true">
      <div class="logo-icon">🔬</div>
      <div class="logo-text" id="authLogoText" data-i18n="authLogo">مختبر<span>عُمان</span> الافتراضي</div>
      <div class="logo-sub">OMAN VIRTUAL STEM LAB</div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist" aria-label="Login or Register">
      <button class="auth-tab active" id="tabLogin"
              role="tab" aria-selected="true" aria-controls="formLogin">
        <span id="tabLoginLabel" data-i18n="loginTab">تسجيل الدخول</span>
      </button>
      <button class="auth-tab" id="tabRegister"
              role="tab" aria-selected="false" aria-controls="formRegister">
        <span id="tabRegisterLabel" data-i18n="registerTab">إنشاء حساب</span>
      </button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <form id="formLogin" role="tabpanel" aria-labelledby="tabLogin" novalidate>

      <div class="auth-error" role="alert" aria-live="assertive"></div>

      <div class="auth-form">

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="loginEmail">
            <span class="label-icon" aria-hidden="true">📧</span>
            <span id="labelLoginEmail" data-i18n="loginEmailLabel">البريد الإلكتروني</span>
          </label>
          <input class="form-input" type="email" id="loginEmail"
                 name="email" autocomplete="email"
                 placeholder="example@school.om"
                 aria-required="true" required>
          <div class="field-error" id="loginEmailError" role="alert"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="loginPassword">
            <span class="label-icon" aria-hidden="true">🔒</span>
            <span id="labelLoginPassword" data-i18n="loginPasswordLabel">كلمة المرور</span>
          </label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="loginPassword"
                   name="password" autocomplete="current-password"
                   placeholder="••••••••"
                   aria-required="true" required>
            <button type="button" class="toggle-password"
                    data-target="loginPassword"
                    aria-label="إظهار كلمة المرور">👁</button>
          </div>
          <div class="field-error" id="loginPasswordError" role="alert"></div>
        </div>

        <button type="submit" class="auth-submit">
          <div class="spinner" aria-hidden="true"></div>
          <span id="btnLoginLabel" data-i18n="loginButton">تسجيل الدخول</span>
        </button>

      </div>

      <div class="auth-footer-note">
        <span id="noAccountText" data-i18n="noAccountText">ليس لديك حساب؟</span>
        <button type="button" onclick="document.getElementById('tabRegister').click()"
                style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:inherit;font-size:inherit;font-weight:700;padding:0 4px;"
                id="goRegisterLink" data-i18n="goRegisterLink">إنشاء حساب مجاني</button>
      </div>

    </form>

    <!-- ── REGISTER FLOW WRAPPER (STEP 1 + STEP 2) ── -->
    <div id="registerFlow" role="tabpanel" aria-labelledby="tabRegister" hidden>

      <!-- Step 1: Registration form -->
      <form id="formRegister" novalidate>
        <div class="auth-error" role="alert" aria-live="assertive"></div>

        <div class="auth-form">

          <!-- Full Name -->
          <div class="form-group">
            <label class="form-label" for="regName">
              <span class="label-icon" aria-hidden="true">👤</span>
              <span id="labelRegName" data-i18n="regFullNameLabel">الاسم الكامل</span>
            </label>
            <input class="form-input" type="text" id="regName"
                   name="name" autocomplete="name"
                   placeholder="محمد الحارثي"
                   aria-required="true" required>
            <div class="field-error" id="regNameError" role="alert"></div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="regEmail">
              <span class="label-icon" aria-hidden="true">📧</span>
              <span id="labelRegEmail" data-i18n="regEmailLabel">البريد الإلكتروني</span>
            </label>
            <input class="form-input" type="email" id="regEmail"
                   name="email" autocomplete="email"
                   placeholder="student@school.om"
                   aria-required="true" required>
            <div class="field-error" id="regEmailError" role="alert"></div>
          </div>

          <!-- School Name -->
          <div class="form-group">
            <label class="form-label" for="regSchool">
              <span class="label-icon" aria-hidden="true">🏫</span>
              <span id="labelRegSchool" data-i18n="regSchoolLabel">اسم المدرسة</span>
            </label>
            <input class="form-input" type="text" id="regSchool"
                   name="school"
                   placeholder="مدرسة النموذجية للتعليم الأساسي"
                   aria-required="true" required>
            <div class="field-error" id="regSchoolError" role="alert"></div>
          </div>

          <!-- Grade -->
          <div class="form-group">
            <label class="form-label" for="regGrade">
              <span class="label-icon" aria-hidden="true">📚</span>
              <span id="labelRegGrade" data-i18n="regGradeLabel">الصف الدراسي</span>
            </label>
            <select class="role-select" id="regGrade" name="grade" aria-required="true">
              <option value="" disabled selected data-i18n="gradePlaceholder">اختر الصف</option>
              <option value="6" data-i18n="grade6">الصف 6</option>
              <option value="7" data-i18n="grade7">الصف 7</option>
              <option value="8" data-i18n="grade8">الصف 8</option>
              <option value="9" data-i18n="grade9">الصف 9</option>
              <option value="10" data-i18n="grade10">الصف 10</option>
              <option value="11" data-i18n="grade11">الصف 11</option>
              <option value="12" data-i18n="grade12">الصف 12</option>
            </select>
            <div class="field-error" id="regGradeError" role="alert"></div>
          </div>

          <!-- Role -->
          <div class="form-group">
            <label class="form-label" for="regRole">
              <span class="label-icon" aria-hidden="true">🎓</span>
              <span id="labelRegRole" data-i18n="regRoleLabel">الدور</span>
            </label>
            <select class="role-select" id="regRole" name="role" aria-required="true">
              <option value="student" id="optStudent" data-i18n="roleStudent">طالب</option>
              <option value="teacher" id="optTeacher" data-i18n="roleTeacher">معلم</option>
            </select>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="regPassword">
              <span class="label-icon" aria-hidden="true">🔒</span>
              <span id="labelRegPassword" data-i18n="regPasswordLabel">كلمة المرور</span>
            </label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="regPassword"
                     name="password" autocomplete="new-password"
                     placeholder="••••••••"
                     aria-required="true"
                     aria-describedby="strengthLabel" required>
              <button type="button" class="toggle-password"
                      data-target="regPassword"
                      aria-label="إظهار كلمة المرور">👁</button>
            </div>
            <div class="strength-bar-wrap" aria-hidden="true">
              <div class="strength-bar-track">
                <div class="strength-bar-fill" id="strengthFill"></div>
              </div>
              <div class="strength-label" id="strengthLabel" aria-live="polite"></div>
            </div>
            <div class="field-error" id="regPasswordError" role="alert"></div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="regConfirmPassword">
              <span class="label-icon" aria-hidden="true">🔐</span>
              <span id="labelRegConfirm" data-i18n="regConfirmPasswordLabel">تأكيد كلمة المرور</span>
            </label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="regConfirmPassword"
                     name="confirmPassword" autocomplete="new-password"
                     placeholder="••••••••"
                     aria-required="true" required>
              <button type="button" class="toggle-password"
                      data-target="regConfirmPassword"
                      aria-label="إظهار كلمة المرور">👁</button>
            </div>
            <div class="field-error" id="regConfirmPasswordError" role="alert"></div>
          </div>

          <!-- Security note -->
          <div class="security-note" role="note">
            <span aria-hidden="true">🔐</span>
            <span id="securityNote" data-i18n="securityNote">كلمة مرورك مشفّرة — لا تُخزّن بصيغتها الأصلية أبداً</span>
          </div>

          <button type="submit" class="auth-submit">
            <div class="spinner" aria-hidden="true"></div>
            <span id="btnRegisterLabel" data-i18n="regButton">إنشاء الحساب</span>
          </button>

        </div>

        <div class="auth-footer-note">
          <span id="haveAccountText" data-i18n="haveAccountText">لديك حساب بالفعل؟</span>
          <button type="button" onclick="document.getElementById('tabLogin').click()"
                  style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:inherit;font-size:inherit;font-weight:700;padding:0 4px;"
                  id="goLoginLink" data-i18n="goLoginLink">تسجيل الدخول</button>
        </div>
      </form>

      <!-- Step 2: OTP verification -->
      <form id="formVerifyOtp" hidden novalidate>
        <div class="auth-error" role="alert" aria-live="assertive"></div>

        <div class="auth-form">
          <h2 class="otp-title" data-i18n="otpTitle">تحقق من بريدك الإلكتروني</h2>
          <p class="otp-desc" data-i18n="otpDescription">
            أرسلنا رمز تحقق مكوّن من 6 أرقام إلى بريدك. أدخله أدناه لتفعيل حسابك.
          </p>

          <div class="form-group">
            <label class="form-label" for="otpCode">
              <span class="label-icon" aria-hidden="true">✅</span>
              <span data-i18n="otpCodeLabel">رمز التحقق</span>
            </label>
            <input class="form-input" type="text" id="otpCode"
                   inputmode="numeric" maxlength="6"
                   placeholder="123456"
                   aria-required="true" required>
            <div class="field-error" id="otpCodeError" role="alert"></div>
          </div>

          <button type="submit" class="auth-submit">
            <div class="spinner" aria-hidden="true"></div>
            <span data-i18n="otpSubmitButton">تأكيد الرمز</span>
          </button>

          <div class="otp-resend-row">
            <span data-i18n="otpResendPrefix">لم يصلك الرمز؟</span>
            <button type="button" id="btnResendOtp" class="otp-resend-btn">
              <span data-i18n="otpResendButton">إعادة إرسال الرمز</span>
            </button>
          </div>
          <div class="otp-countdown" id="otpCountdown" aria-live="polite"></div>
        </div>
      </form>

    </div>

  </div>

</main>

<script src="js/i18n.js" defer></script>
<script src="js/Auth.js" defer></script>

</body>
</html>
